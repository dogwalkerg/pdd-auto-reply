name: Build Images And Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}
  DEPLOY_DIR: /opt/pdd-auto-reply

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            dockerfile: backend/Dockerfile
            image: backend
          - service: websocket
            dockerfile: websocket/Dockerfile
            image: websocket
          - service: scheduler
            dockerfile: scheduler/Dockerfile
            image: scheduler
          - service: frontend
            dockerfile: frontend/Dockerfile
            image: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}:latest
            ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Upload compose file
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_PASSWORD"
          export SSHPASS="$VPS_PASSWORD"
          sshpass -e ssh -o StrictHostKeyChecking=no -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" "mkdir -p '${{ env.DEPLOY_DIR }}'"
          sshpass -e scp -o StrictHostKeyChecking=no -P "${VPS_PORT:-22}" docker-compose.ghcr.yml "$VPS_USER@$VPS_HOST:${{ env.DEPLOY_DIR }}/docker-compose.yml"

      - name: Deploy compose stack
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          DATA_ENCRYPT_KEY: ${{ secrets.DATA_ENCRYPT_KEY }}
          INTERNAL_SERVICE_TOKEN: ${{ secrets.INTERNAL_SERVICE_TOKEN }}
          DEFAULT_ADMIN_USERNAME: ${{ secrets.DEFAULT_ADMIN_USERNAME }}
          DEFAULT_ADMIN_PASSWORD: ${{ secrets.DEFAULT_ADMIN_PASSWORD }}
        run: |
          export SSHPASS="$VPS_PASSWORD"
          sshpass -e ssh -o StrictHostKeyChecking=no -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" /bin/bash <<EOF
          set -euo pipefail
          cd '${{ env.DEPLOY_DIR }}'

          cat > .env <<'ENVEOF'
          COMPOSE_PROJECT_NAME=pdd-auto-reply
          IMAGE_PREFIX=${{ env.IMAGE_PREFIX }}
          IMAGE_TAG=latest
          ENVIRONMENT=production
          MYSQL_PASSWORD=${MYSQL_PASSWORD:-pdd_root_2026}
          MYSQL_DATABASE=pdd_auto_reply
          MYSQL_USER=root
          MYSQL_HOST=mysql
          MYSQL_PORT=3306
          MYSQL_HOST_PORT=127.0.0.1:3306
          REDIS_PASSWORD=${REDIS_PASSWORD:-pdd_redis_2026}
          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_DB=0
          REDIS_HOST_PORT=127.0.0.1:6379
          BACKEND_WEB_PORT=8089
          WEBSOCKET_PORT=8090
          SCHEDULER_PORT=8091
          BACKEND_WEB_HOST_PORT=127.0.0.1:8089
          WEBSOCKET_HOST_PORT=127.0.0.1:8090
          SCHEDULER_HOST_PORT=127.0.0.1:8091
          FRONTEND_HOST_PORT=8088
          BACKEND_WEB_SERVICE_URL=http://backend:8089
          WEBSOCKET_SERVICE_URL=http://websocket:8090
          SCHEDULER_SERVICE_URL=http://scheduler:8091
          BACKEND_API_URL=http://backend:8089
          JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-env}
          DATA_ENCRYPT_KEY=${DATA_ENCRYPT_KEY:-change-me-data-encrypt-key}
          INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-change-me-internal-service-token}
          DEFAULT_ADMIN_USERNAME=${DEFAULT_ADMIN_USERNAME:-admin}
          DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-admin123}
          BROWSER_HEADLESS=true
          MAX_CAPTCHA_CONCURRENT=1
          PLAYWRIGHT_USER_DATA_DIR=/app/websocket/browser_data
          LOG_LEVEL=INFO
          ENVEOF

          echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin
          docker compose pull
          docker compose up -d
          docker compose ps
          EOF
