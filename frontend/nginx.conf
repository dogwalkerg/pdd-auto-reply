# Nginx 配置模板 —— 拼多多自动回复系统前端
# ==============================================================================
# 本文件用途：作为 nginx 静态资源服务与后端反向代理配置模板。
# 关键约束（规范 21 / 需求 25.4）：后端服务地址禁止写死 localhost，统一经
# 环境变量管理。本文件作为 nginx 官方镜像的「配置模板」放置于
# /etc/nginx/templates/ 下，容器启动时由内置 envsubst 将 ${BACKEND_API_URL}
# 等环境变量替换为实际值后生成最终配置（见 Dockerfile）。
#
# 可配置环境变量：
#   - BACKEND_API_URL：后端 HTTP API 地址，默认 http://backend:8089
#                      （docker-compose 中的服务名，由编排网络解析）。
# 说明：nginx 内置变量（如 $host、$remote_addr、$http_upgrade、$uri）不带花括号
# 形式，nginx 模板机制仅替换「已声明的环境变量」，故不会被误替换。
server {
    listen 80;
    server_name _;

    # 前端静态资源根目录（Vite 构建产物）
    root /usr/share/nginx/html;
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;
    gzip_comp_level 6;

    # 前端构建产物（带 hash 文件名）长缓存
    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 在线聊天实时推送 WebSocket（长连接，需独立的超长读超时，避免被 90s 截断）
    # 必须置于 /api 之前：nginx location 前缀匹配按「最长前缀」，但同为前缀匹配时
    # 更精确的 /api/v1/chat/ws 会优先命中（需求 14，方案 2 实时推送）。
    location /api/v1/chat/ws {
        proxy_pass ${BACKEND_API_URL};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # WebSocket 长连接：读超时取 24 小时，避免空闲时被 nginx 主动断开
        proxy_read_timeout 86400s;
        proxy_connect_timeout 75s;
    }

    # API 反向代理到后端 HTTP 服务（地址经环境变量 BACKEND_API_URL，禁止写死 localhost）
    location /api {
        client_max_body_size 50m;
        proxy_pass ${BACKEND_API_URL};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # 与前端请求超时（90 秒）保持兼容
        proxy_read_timeout 90s;
        proxy_connect_timeout 75s;
    }

    # 后端静态文件（上传图片等）反向代理（地址经环境变量 BACKEND_API_URL）
    location /static {
        proxy_pass ${BACKEND_API_URL}/static;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA 前端路由支持
    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
